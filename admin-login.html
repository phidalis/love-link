<!-- admin-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LoveLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin-login.css">
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyC_H3OGktcvRhUsM2g7O_vf4WFQ5ucZ0xw",
    authDomain: "lovelink-97087.firebaseapp.com",
    projectId: "lovelink-97087",
    storageBucket: "lovelink-97087.firebasestorage.app",
    messagingSenderId: "962378928673",
    appId: "1:962378928673:web:aee8799e9f824afa2fc960"
  };
  
  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getFirestore(app);
  window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  window.doc = doc;
  window.getDoc = getDoc;
</script>
</head>
<body>
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-heart"></i>
                    <span>LoveLink</span>
                </div>
                <h2>Admin Portal</h2>
                <p>Secure access only</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="adminEmail" placeholder="Admin Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
                <div id="loginError" class="error-message" style="display:none;"></div>
            </form>
            
            <div class="login-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Site</a>
            </div>
        </div>
    </div>
    
    <script src="admin-login.js"></script>
</body>
</html>
